<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instaclone</title>
<link href="https://fonts.googleapis.com/css2?family=Satisfy&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--surface:#fff;--border:#dbdbdb;--text:#262626;--muted:#737373;
  --accent:#0095f6;--danger:#ed4956;--story1:#f09433;--story2:#e6683c;--story3:#dc2743;--story4:#cc2366;--story5:#bc1888;
  --nav-h:60px;--sidebar-w:244px;
}
.dark{
  --bg:#000;--surface:#121212;--border:#262626;--text:#fafafa;--muted:#a8a8a8;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
img{display:block}
input{font-family:inherit}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
  border-right:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;padding:8px 12px;z-index:100;
  transition:background .2s,border-color .2s;
}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}

/* ── SIDEBAR ── */
.sb-logo{padding:16px 12px 28px;font-family:'Satisfy',cursive;font-size:26px;cursor:pointer}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:16px;padding:12px;border-radius:10px;
  cursor:pointer;font-size:16px;font-weight:400;transition:background .15s;
  color:var(--text);
}
.sb-item:hover{background:var(--border)}
.sb-item.active{font-weight:600}
.sb-item svg{width:24px;height:24px;flex-shrink:0;stroke:var(--text);fill:none;stroke-width:1.5}
.sb-item.active svg{stroke-width:2.2}
.sb-bottom{padding-bottom:8px;display:flex;flex-direction:column;gap:2px}
.avatar-sm{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--border)}
.avatar-xs{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--border)}
.avatar-md{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--border)}
.avatar-lg{width:56px;height:56px;border-radius:50%;object-fit:cover}
.avatar-xl{width:84px;height:84px;border-radius:50%;object-fit:cover}
.avatar-xxl{width:150px;height:150px;border-radius:50%;object-fit:cover}

/* ── FEED PAGE ── */
.feed-layout{display:flex;justify-content:center;gap:32px;padding:30px 20px}
.feed-col{width:470px;flex-shrink:0}
.right-col{width:320px;flex-shrink:0}

/* ── STORIES ── */
.stories-strip{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px 20px;display:flex;gap:18px;
  overflow-x:auto;margin-bottom:24px;
}
.stories-strip::-webkit-scrollbar{height:0}
.story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.story-ring{
  width:66px;height:66px;border-radius:50%;
  background:linear-gradient(45deg,var(--story1),var(--story2),var(--story3),var(--story4),var(--story5));
  padding:2px;display:flex;align-items:center;justify-content:center;
}
.story-ring.seen{background:var(--border)}
.story-ring-inner{background:var(--surface);border-radius:50%;width:100%;height:100%;overflow:hidden;border:2px solid var(--surface)}
.story-name{font-size:12px;color:var(--text);max-width:66px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-story{width:62px;height:62px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent)}

/* ── POST CARD ── */
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:24px}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-header-info{flex:1}
.post-username{font-weight:600;font-size:14px}
.post-subtitle{font-size:12px;color:var(--muted)}
.post-more{padding:8px;color:var(--text);font-size:20px;line-height:1}
.post-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--border)}
.post-actions{display:flex;align-items:center;padding:8px 16px 0}
.post-actions button{padding:8px;color:var(--text)}
.post-actions button svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:1.5}
.post-actions button.liked svg{stroke:var(--danger);fill:var(--danger)}
.post-actions button.saved svg{fill:var(--text);stroke:var(--text)}
.post-spacer{flex:1}
.post-likes{padding:4px 16px;font-weight:600;font-size:14px}
.post-caption{padding:2px 16px;line-height:1.5}
.post-caption span{font-weight:600}
.post-comments-link{padding:2px 16px;color:var(--muted);font-size:14px;cursor:pointer}
.post-time{padding:2px 16px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.post-add-comment{
  display:flex;align-items:center;padding:10px 16px;
  border-top:1px solid var(--border);gap:12px;
}
.post-add-comment input{
  flex:1;border:none;outline:none;background:none;font-size:14px;color:var(--text);
}
.post-add-comment button{color:var(--accent);font-weight:600;font-size:14px}

/* ── RIGHT SIDEBAR ── */
.right-sidebar{position:sticky;top:30px}
.rs-profile{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.rs-user-info{flex:1}
.rs-username{font-weight:600;font-size:14px}
.rs-name{font-size:12px;color:var(--muted)}
.rs-switch{color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
.rs-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rs-section-title{font-size:14px;font-weight:600;color:var(--muted)}
.rs-see-all{font-size:12px;font-weight:600;color:var(--text);cursor:pointer}
.rs-suggest{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rs-suggest-info{flex:1}
.rs-suggest-user{font-weight:600;font-size:13px}
.rs-suggest-sub{font-size:12px;color:var(--muted)}
.rs-follow{color:var(--accent);font-size:13px;font-weight:600;cursor:pointer}
.rs-footer{font-size:11px;color:var(--muted);line-height:1.8;margin-top:20px}
.rs-footer a{color:var(--muted)}

/* ── EXPLORE ── */
.explore-page{padding:24px 0}
.explore-search{
  display:flex;align-items:center;background:var(--border);
  border-radius:8px;padding:8px 16px;gap:8px;margin:0 20px 24px;
}
.explore-search input{
  background:none;border:none;outline:none;width:100%;font-size:14px;color:var(--text);
}
.explore-search svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0}
.explore-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:3px;padding:0 0;
}
.explore-cell{
  aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:var(--border);
}
.explore-cell img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.explore-cell:hover img{transform:scale(1.04)}
.explore-cell.tall{grid-row:span 2}
.explore-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;gap:20px;
  opacity:0;transition:opacity .2s;color:#fff;font-weight:700;font-size:15px;
}
.explore-cell:hover .explore-overlay{opacity:1}
.explore-overlay span{display:flex;align-items:center;gap:6px}

/* ── PROFILE PAGE ── */
.profile-page{max-width:935px;margin:0 auto;padding:30px 20px}
.profile-header{display:flex;gap:80px;margin-bottom:40px;align-items:flex-start}
.profile-avatar-wrap{flex-shrink:0}
.profile-info-col{flex:1}
.profile-top-row{display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.profile-username-text{font-size:20px;font-weight:300}
.btn-primary{
  background:var(--accent);color:#fff;border-radius:8px;
  padding:7px 18px;font-size:14px;font-weight:600;
}
.btn-secondary{
  background:var(--border);color:var(--text);border-radius:8px;
  padding:7px 18px;font-size:14px;font-weight:600;
}
.btn-icon{
  background:var(--border);border-radius:8px;
  padding:7px 10px;font-size:14px;font-weight:600;
}
.profile-stats{display:flex;gap:36px;margin-bottom:20px}
.profile-stat{font-size:16px}
.profile-stat strong{font-weight:600}
.profile-name-bio p{font-size:14px;line-height:1.6}
.profile-bio-bold{font-weight:600;font-size:14px}
.profile-tabs{display:flex;border-top:1px solid var(--border);margin-bottom:0}
.profile-tab{
  flex:1;max-width:180px;padding:14px 0;text-align:center;
  font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;border-top:2px solid transparent;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.profile-tab.active{color:var(--text);border-top-color:var(--text)}
.profile-tab svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.profile-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px;
}
.profile-thumb{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:var(--border)}
.profile-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.profile-thumb:hover img{transform:scale(1.04)}
.profile-thumb-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;gap:20px;
  opacity:0;transition:opacity .15s;color:#fff;font-weight:700;font-size:14px;
}
.profile-thumb:hover .profile-thumb-overlay{opacity:1}

/* ── STORY VIEWER ── */
.story-viewer-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;
  display:flex;align-items:center;justify-content:center;
}
.story-viewer{position:relative;width:380px;max-height:90vh}
.sv-bar{display:flex;gap:4px;padding:12px 12px 0;position:absolute;top:0;left:0;right:0;z-index:2}
.sv-seg{height:2px;flex:1;background:rgba(255,255,255,.4);border-radius:2px;overflow:hidden}
.sv-seg-fill{height:100%;background:#fff;width:0;transition:none}
.sv-seg-fill.done{width:100%}
.sv-seg-fill.active{width:0;animation:progress 4s linear forwards}
@keyframes progress{to{width:100%}}
.sv-header{
  position:absolute;top:20px;left:0;right:0;z-index:2;
  display:flex;align-items:center;gap:10px;padding:0 12px;
}
.sv-header-name{color:#fff;font-weight:600;font-size:14px}
.sv-header-time{color:rgba(255,255,255,.7);font-size:12px}
.sv-close{margin-left:auto;color:#fff;font-size:24px;line-height:1;padding:4px}
.sv-img{width:100%;border-radius:12px;display:block;min-height:500px;object-fit:cover;background:#222}
.sv-nav{
  position:absolute;top:0;bottom:0;width:40%;cursor:pointer;
}
.sv-nav.left{left:0}
.sv-nav.right{right:0}

/* ── NOTIFICATIONS dot ── */
.notif-dot{
  width:8px;height:8px;background:#ff3040;border-radius:50%;
  position:absolute;top:8px;left:26px;
}

/* ── DARK TOGGLE ── */
.dark-toggle{
  display:flex;align-items:center;gap:10px;padding:12px;
  border-radius:10px;cursor:pointer;margin-top:auto;
}
.dark-toggle:hover{background:var(--border)}
.toggle-track{
  width:42px;height:24px;background:var(--border);border-radius:12px;
  position:relative;transition:background .2s;flex-shrink:0;
}
.dark .toggle-track{background:var(--accent)}
.toggle-thumb{
  width:20px;height:20px;background:#fff;border-radius:50%;
  position:absolute;top:2px;left:2px;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.dark .toggle-thumb{transform:translateX(18px)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .right-col{display:none}
  .sidebar{width:72px}
  .sb-logo{font-size:0;padding:16px 22px 28px}
  .sb-logo::after{content:'📷';font-size:22px}
  .sb-item span{display:none}
  .main{margin-left:72px}
  .feed-col{width:100%;max-width:470px}
}
@media(max-width:600px){
  .sidebar{display:none}
  .main{margin-left:0;padding-bottom:60px}
  .mobile-nav{display:flex}
}
.mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  justify-content:space-around;padding:10px 0;z-index:100;
}
.mobile-nav button{padding:8px 16px;color:var(--text)}
.mobile-nav svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:1.5;display:block}
</style>
</head>

    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    profile: <><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  };
  return <svg style={s} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" strokeLinecap="round" strokeLinejoin="round">{paths[name]}</svg>;
};

/* ── FORMAT NUMBER ── */
const fmt = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'k' : n;

/* ── STORY VIEWER ── */
const StoryViewer = ({stories, startIdx, onClose}) => {
  const [idx, setIdx] = useState(startIdx);
  const [key, setKey] = useState(0);

  const go = (dir) => {
    const next = idx + dir;
    if(next < 0 || next >= stories.length) { onClose(); return; }
    setIdx(next);
    setKey(k => k+1);
  };

  useEffect(() => {
    const t = setTimeout(() => go(1), 4000);
    return () => clearTimeout(t);
  }, [idx]);

  const s = stories[idx];
  return (
    <div className="story-viewer-backdrop" onClick={onClose}>
      <div className="story-viewer" onClick={e => e.stopPropagation()}>
        <div className="sv-bar">
          {stories.map((_, i) => (
            <div className="sv-seg" key={i}>
              <div className={`sv-seg-fill ${i < idx ? 'done' : i === idx ? 'active' : ''}`} key={i === idx ? key : i}/>
            </div>
          ))}
        </div>
        <img className="sv-img" src={IMAGES[idx % IMAGES.length]} alt="story"/>
        <div className="sv-header">
          <img className="avatar-xs" src={s.avatar} alt={s.username}/>
          <span className="sv-header-name">{s.username}</span>
          <span className="sv-header-time">2h ago</span>
          <button className="sv-close" onClick={onClose}>✕</button>
        </div>
        <div className="sv-nav left" onClick={() => go(-1)}/>
        <div className="sv-nav right" onClick={() => go(1)}/>
      </div>
    </div>
  );
};

/* ── STORIES STRIP ── */
const StoriesStrip = () => {
  const [viewer, setViewer] = useState(null);
  const [seen, setSeen] = useState(new Set());

  const open = (i) => {
    setSeen(s => new Set([...s, i]));
    setViewer(i);
  };

  return (
    <>
      <div className="stories-strip">
        {USERS.map((u, i) => (
          <div className="story-item" key={u.id} onClick={() => open(i)}>
            <div className={`story-ring ${seen.has(i)?'seen':''}`}>
              <div className="story-ring-inner">
                <img src={u.avatar} alt={u.username} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              </div>
            </div>
            <span className="story-name">{u.username}</span>
          </div>
        ))}
      </div>
      {viewer !== null && (
        <StoryViewer stories={USERS} startIdx={viewer} onClose={() => setViewer(null)}/>
      )}
    </>
  );
};

/* ── POST CARD ── */
const PostCard = ({post: initialPost}) => {
  const [post, setPost] = useState(initialPost);
  const [comment, setComment] = useState('');

  const toggleLike = () => setPost(p => ({...p, liked:!p.liked, likes:p.liked?p.likes-1:p.likes+1}));
  const toggleSave = () => setPost(p => ({...p, saved:!p.saved}));

  return (
    <div className="post-card">
      <div className="post-header">
        <div className="story-ring" style={{width:44,height:44,padding:2}}>
          <div className="story-ring-inner">
            <img src={post.user.avatar} alt={post.user.username} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          </div>
        </div>
        <div className="post-header-info">
          <div className="post-username">{post.user.username}</div>
          <div className="post-subtitle">{post.time}</div>
        </div>
        <button className="post-more"><Icon name="more"/></button>
      </div>

      <img className="post-img" src={post.image} alt="post" loading="lazy"/>

      <div className="post-actions">
        <button className={post.liked?'liked':''} onClick={toggleLike}>
          <Icon name="heart" filled={post.liked} color={post.liked?'#ed4956':undefined}/>
        </button>
        <button><Icon name="comment"/></button>
        <button><Icon name="share"/></button>
        <div className="post-spacer"/>
        <button className={post.saved?'saved':''} onClick={toggleSave}>
          <Icon name="bookmark" filled={post.saved}/>
        </button>
      </div>

      <div className="post-likes">{fmt(post.likes)} likes</div>
      <div className="post-caption"><span>{post.user.username} </span>{post.caption}</div>
      <div className="post-comments-link">View all {fmt(post.comments)} comments</div>
      <div className="post-time">{post.time}</div>

      <div className="post-add-comment">
        <input
          value={comment}
          onChange={e => setComment(e.target.value)}
          placeholder="Add a comment..."
          onKeyDown={e => e.key==='Enter' && setComment('')}
        />
        {comment && <button onClick={() => setComment('')}>Post</button>}
      </div>
    </div>
  );
};

/* ── RIGHT SIDEBAR ── */
const RightSidebar = () => {
  const [following, setFollowing] = useState({});
  const toggle = id => setFollowing(f => ({...f, [id]:!f[id]}));

  return (
    <div className="right-sidebar">
      <div className="rs-profile">
        <img className="avatar-md" src={USERS[0].avatar} alt="me"/>
        <div className="rs-user-info">
          <div className="rs-username">{USERS[0].username}</div>
          <div className="rs-name">{USERS[0].name}</div>
        </div>
        <span className="rs-switch">Switch</span>
      </div>

      <div className="rs-section-header">
        <span className="rs-section-title">Suggested for you</span>
        <span className="rs-see-all">See All</span>
      </div>

      {USERS.slice(1).map(u => (
        <div className="rs-suggest" key={u.id}>
          <img className="avatar-xs" src={u.avatar} alt={u.username}/>
          <div className="rs-suggest-info">
            <div className="rs-suggest-user">{u.username}</div>
            <div className="rs-suggest-sub">Followed by {fmt(u.followers)} others</div>
          </div>
          <button className="rs-follow" onClick={() => toggle(u.id)}>
            {following[u.id] ? 'Following' : 'Follow'}
          </button>
        </div>
      ))}

      <div className="rs-footer">
        About · Help · Press · API · Jobs · Privacy · Terms · Locations · Language
        <br/>© 2025 Instaclone — Built with React
      </div>
    </div>
  );
};

/* ── FEED PAGE ── */
const FeedPage = () => (
  <div className="feed-layout">
    <div className="feed-col">
      <StoriesStrip/>
      {POSTS_DATA.map(p => <PostCard key={p.id} post={p}/>)}
    </div>
    <div className="right-col">
      <RightSidebar/>
    </div>
  </div>
);

/* ── EXPLORE PAGE ── */
const ExplorePage = () => {
  const [q, setQ] = useState('');
  const imgs = EXPLORE_IMGS.filter((_, i) =>
    !q || ['mountain','ocean','forest','sunset','beach','lake','sky','travel'][i%8].includes(q.toLowerCase())
  );

  const layout = [0,1,1,0,0,1,0,0,1,0,1,0,0,0,1,0,0,1];

  return (
    <div className="explore-page">
      <div className="explore-search">
        <Icon name="search" size={16}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search"/>
      </div>
      <div className="explore-grid">
        {EXPLORE_IMGS.map((img, i) => (
          <div className={`explore-cell ${layout[i%layout.length]?'tall':''}`} key={i}>
            <img src={img} alt="" loading="lazy"/>
            <div className="explore-overlay">
              <span>❤️ {fmt(Math.floor(Math.random()*8000)+500)}</span>
              <span>💬 {fmt(Math.floor(Math.random()*300)+20)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── PROFILE PAGE ── */
const ProfilePage = () => {
  const [tab, setTab] = useState('posts');
  const [followed, setFollowed] = useState(false);
  const user = USERS[0];

  return (
    <div className="profile-page">
      <div className="profile-header">
        <div className="profile-avatar-wrap">
          <div className="story-ring" style={{width:168,height:168,padding:3}}>
            <div className="story-ring-inner">
              <img src={user.avatar} alt={user.username} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          </div>
        </div>
        <div className="profile-info-col">
          <div className="profile-top-row">
            <span className="profile-username-text">{user.username}</span>
            <button className={`btn-${followed?'secondary':'primary'}`} onClick={() => setFollowed(f => !f)}>
              {followed ? 'Following' : 'Follow'}
            </button>
            <button className="btn-secondary">Message</button>
            <button className="btn-icon"><Icon name="settings" size={20}/></button>
          </div>
          <div className="profile-stats">
            <div className="profile-stat"><strong>{user.posts}</strong> posts</div>
            <div className="profile-stat"><strong>{fmt(user.followers + (followed?1:0))}</strong> followers</div>
            <div className="profile-stat"><strong>{fmt(user.following)}</strong> following</div>
          </div>
          <div className="profile-name-bio">
            <p className="profile-bio-bold">{user.name}</p>
            <p>{user.bio}</p>
            <p style={{color:'var(--accent)',fontWeight:500,marginTop:4}}>github.com/{user.username}</p>
          </div>
        </div>
      </div>

      <div className="profile-tabs">
        <div className={`profile-tab ${tab==='posts'?'active':''}`} onClick={() => setTab('posts')}>
          <Icon name="grid" size={12}/>Posts
        </div>
        <div className={`profile-tab ${tab==='tagged'?'active':''}`} onClick={() => setTab('tagged')}>
          <Icon name="tag" size={12}/>Tagged
        </div>
      </div>

      <div className="profile-grid">
        {IMAGES.map((img, i) => (
          <div className="profile-thumb" key={i}>
            <img src={img} alt="" loading="lazy"/>
            <div className="profile-thumb-overlay">
              <span>❤️ {fmt(Math.floor(Math.random()*3000)+200)}</span>
              <span>💬 {fmt(Math.floor(Math.random()*100)+10)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── SIDEBAR ── */
const Sidebar = ({page, setPage, dark, setDark}) => {
  const items = [
    {id:'feed',   icon:'home',    label:'Home'},
    {id:'search', icon:'search',  label:'Search'},
    {id:'explore',icon:'explore', label:'Explore'},
    {id:'reels',  icon:'reel',    label:'Reels'},
    {id:'message',icon:'message', label:'Messages'},
    {id:'notif',  icon:'heart',   label:'Notifications'},
    {id:'create', icon:'plus',    label:'Create'},
    {id:'profile',icon:'profile', label:'Profile'},
  ];

  return (
    <aside className="sidebar">
      <div className="sb-logo" onClick={() => setPage('feed')}>
        Instaclone
      </div>
      <nav className="sb-nav">
        {items.map(item => (
          <div key={item.id} className={`sb-item ${page===item.id?'active':''}`}
            onClick={() => setPage(item.id)} style={{position:'relative'}}>
            <Icon name={item.icon} filled={page===item.id}/>
            <span>{item.label}</span>
            {item.id==='notif' && <div className="notif-dot"/>}
          </div>
        ))}
      </nav>
      <div className="sb-bottom">
        <div className="dark-toggle" onClick={() => setDark(d=>!d)}>
          <Icon name={dark?'sun':'moon'} size={22}/>
          <span style={{flex:1,fontSize:15}}>{dark?'Light mode':'Dark mode'}</span>
          <div className="toggle-track"><div className="toggle-thumb"/></div>
        </div>
      </div>
    </aside>
  );
};

/* ── MOBILE NAV ── */
const MobileNav = ({page, setPage}) => (
  <nav className="mobile-nav">
    <button onClick={() => setPage('feed')}><Icon name="home" filled={page==='feed'}/></button>
    <button onClick={() => setPage('explore')}><Icon name="explore" filled={page==='explore'}/></button>
    <button onClick={() => setPage('create')}><Icon name="plus"/></button>
    <button onClick={() => setPage('notif')}><Icon name="heart"/></button>
    <button onClick={() => setPage('profile')}><Icon name="profile" filled={page==='profile'}/></button>
  </nav>
);

/* ── APP ── */
const App = () => {
  const [page, setPage] = useState('feed');
  const [dark, setDark] = useState(false);

  useEffect(() => {
    document.body.classList.toggle('dark', dark);
  }, [dark]);

  const renderPage = () => {
    if(page==='feed')    return <FeedPage/>;
    if(page==='explore') return <ExplorePage/>;
    if(page==='profile') return <ProfilePage/>;
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh',flexDirection:'column',gap:12,color:'var(--muted)'}}>
        <Icon name={page==='message'?'message':page==='reels'?'reel':'heart'} size={48}/>
        <p style={{fontSize:16,fontWeight:500}}>{page.charAt(0).toUpperCase()+page.slice(1)} coming soon</p>
      </div>
    );
  };

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} dark={dark} setDark={setDark}/>
      <main className="main">{renderPage()}</main>
      <MobileNav page={page} setPage={setPage}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
